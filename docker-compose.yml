services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: auron
      POSTGRES_USER: auron_user
      POSTGRES_PASSWORD: auron_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env.local
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
